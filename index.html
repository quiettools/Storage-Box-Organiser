<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Organiser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.12);
    --border-med: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #6b6b68;
    --text3: #9e9e9a;
    --accent: #2a6049;
    --accent-bg: #e8f2ee;
    --accent-text: #1a4030;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a; --surface: #242426; --surface2: #2e2e30;
      --border: rgba(255,255,255,0.1); --border-med: rgba(255,255,255,0.2);
      --text: #f0f0ec; --text2: #a0a09c; --text3: #606060;
      --accent: #4caf85; --accent-bg: #1a3028; --accent-text: #7de0b8;
      --danger: #e06060; --danger-bg: #2e1a1a;
    }
  }

  body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .topbar {
    background: var(--surface); border-bottom: 0.5px solid var(--border);
    padding: 0 1.5rem; display: flex; align-items: center;
    justify-content: space-between; height: 58px;
    position: sticky; top: 0; z-index: 50;
  }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; font-size: 13px; font-weight: 500;
    border-radius: 8px; border: 0.5px solid var(--border-med);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-primary:hover { opacity: 0.88; background: var(--accent); }
  .btn-danger { color: var(--danger); border-color: rgba(163,45,45,0.25); }
  .btn-danger:hover { background: var(--danger-bg); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--surface2); }

  .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.25rem; }
  .section-title { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }

  .box-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.1rem;
    cursor: pointer; transition: border-color 0.15s, transform 0.12s;
  }
  .box-card:hover { border-color: var(--border-med); transform: translateY(-2px); }
  .box-card-thumb {
    width: 100%; height: 90px; border-radius: 8px; object-fit: cover;
    margin-bottom: 10px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--text3);
  }
  .box-card-thumb img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; }
  .box-num { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
  .box-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .box-meta { font-size: 12px; color: var(--text2); }
  .box-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--surface2); color: var(--text2); }

  .add-card {
    border: 0.5px dashed var(--border-med); border-radius: var(--radius-lg);
    min-height: 130px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; color: var(--text3); font-size: 13px;
    transition: border-color 0.15s, color 0.15s;
  }
  .add-card:hover { border-color: var(--accent); color: var(--accent); }
  .add-card-plus { font-size: 26px; font-weight: 300; }

  /* ── Box detail panel (full page, not modal) ── */
  .detail-view {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 100; overflow-y: auto;
    animation: slideIn 0.18s ease;
  }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

  .detail-topbar {
    background: var(--surface); border-bottom: 0.5px solid var(--border);
    padding: 0 1.5rem; display: flex; align-items: center;
    justify-content: space-between; height: 58px;
    position: sticky; top: 0; z-index: 10;
  }
  .detail-topbar-left { display: flex; align-items: center; gap: 12px; }
  .detail-topbar h2 { font-size: 16px; font-weight: 600; }
  .detail-topbar-actions { display: flex; gap: 8px; }

  .detail-body { max-width: 760px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }

  /* autosave indicator */
  .save-indicator {
    font-size: 12px; color: var(--accent); opacity: 0;
    transition: opacity 0.3s; display: flex; align-items: center; gap: 4px;
  }
  .save-indicator.show { opacity: 1; }

  /* ── Fields ── */
  .field { margin-bottom: 1.1rem; }
  .field label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 5px;
  }
  .field input, .field textarea {
    width: 100%; padding: 8px 11px;
    border: 0.5px solid var(--border-med); border-radius: 8px;
    font-size: 14px; font-family: inherit;
    background: var(--surface); color: var(--text); transition: border-color 0.12s;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 68px; }

  .two-col { display: grid; grid-template-columns: 90px 1fr; gap: 12px; }

  /* ── Items ── */
  .item-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .item-row input { flex: 1; }
  .rm-item {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 20px; padding: 0 3px; line-height: 1; transition: color 0.12s;
  }
  .rm-item:hover { color: var(--danger); }

  /* ── Photos ── */
  .photos-section { margin-bottom: 1.5rem; }
  .photos-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .photos-header label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); }

  .photos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .photo-card {
    border: 0.5px solid var(--border); border-radius: var(--radius);
    overflow: hidden; position: relative; background: var(--surface2);
  }
  .photo-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
  .photo-label-area { padding: 7px 8px 8px; }
  .photo-label {
    font-size: 12px; color: var(--text); font-weight: 500;
    border: none; background: transparent; width: 100%;
    padding: 2px 0; font-family: inherit; display: block;
  }
  .photo-label:focus { outline: none; border-bottom: 1px solid var(--accent); }
  .photo-status { font-size: 10px; color: var(--text3); margin-top: 3px; min-height: 14px; }
  .photo-rm {
    position: absolute; top: 5px; right: 5px;
    width: 24px; height: 24px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: #fff;
    border: none; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-rm:hover { background: rgba(163,45,45,0.85); }
  .ai-badge {
    position: absolute; top: 5px; left: 5px;
    font-size: 10px; padding: 2px 7px; border-radius: 999px;
    background: var(--accent-bg); color: var(--accent-text); font-weight: 600;
  }

  /* upload tile */
  .upload-tile {
    border: 1.5px dashed var(--border-med); border-radius: var(--radius);
    min-height: 120px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; color: var(--text3); font-size: 12px;
    transition: border-color 0.15s, color 0.15s; position: relative;
  }
  .upload-tile:hover { border-color: var(--accent); color: var(--accent); }
  .upload-tile input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-tile-icon { font-size: 24px; }

  /* loading photo tile */
  .photo-loading {
    border: 0.5px solid var(--border); border-radius: var(--radius);
    height: 120px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: var(--surface2); color: var(--text3); font-size: 12px;
  }

  /* ── QR ── */
  .qr-wrap {
    background: var(--surface2); border-radius: var(--radius);
    padding: 1rem; text-align: center; margin-top: 0.5rem;
  }
  .qr-wrap-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
  #qr-output { display: inline-block; }
  #qr-output canvas, #qr-output img { border-radius: 6px; }
  .qr-url-text { font-size: 10px; color: var(--text3); margin-top: 6px; word-break: break-all; }

  /* ── Spinner ── */
  .spin {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid var(--border-med); border-top-color: var(--accent);
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 4rem 1rem; color: var(--text3); grid-column: 1/-1; }
  .empty-icon { font-size: 44px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* settings overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 300; padding: 1rem;
  }
  .modal {
    background: var(--surface); border-radius: var(--radius-lg);
    width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 1.4rem; border-bottom: 0.5px solid var(--border);
  }
  .modal-head h2 { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 1.25rem 1.4rem; }
  .modal-foot {
    padding: 1rem 1.4rem; border-top: 0.5px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .close-x {
    width: 30px; height: 30px; border-radius: 50%;
    border: 0.5px solid var(--border); background: none;
    cursor: pointer; font-size: 18px; color: var(--text2);
    display: flex; align-items: center; justify-content: center;
  }
  .close-x:hover { background: var(--surface2); }

  @media (max-width: 500px) {
    .topbar, .detail-topbar { padding: 0 1rem; }
    .main, .detail-body { padding: 1.25rem 0.75rem 3rem; }
    .two-col { grid-template-columns: 75px 1fr; }
    .photos-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }
</style>
</head>
<body>

<!-- ── Home screen ── -->
<div id="home-screen">
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div> Box Organiser</div>
    <div class="topbar-actions">
      <button class="btn btn-sm btn-ghost" onclick="openSettings()">⚙ Settings</button>
      <button class="btn btn-sm" onclick="printAllLabels()">🖨 Print labels</button>
      <button class="btn btn-sm btn-primary" onclick="createNewBox()">+ New box</button>
    </div>
  </div>
  <div class="main">
    <div class="section-header">
      <span class="section-title" id="box-count-label">Your boxes</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- ── Box detail screen ── -->
<div id="detail-screen" style="display:none" class="detail-view">
  <div class="detail-topbar">
    <div class="detail-topbar-left">
      <button class="btn btn-sm btn-ghost" onclick="closeDetail()">← Back</button>
      <h2 id="detail-title">Box #1</h2>
    </div>
    <div class="detail-topbar-actions">
      <span class="save-indicator" id="save-indicator">✓ Saved</span>
      <button class="btn btn-sm" onclick="printOneLabel()">🖨 Label</button>
      <button class="btn btn-sm btn-danger" onclick="deleteBox()">Delete</button>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- ── Settings modal ── -->
<div class="overlay" id="settings-modal" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-head">
      <h2>Settings</h2>
      <button class="close-x" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Anthropic API key</label>
        <input type="password" id="s-apikey" placeholder="sk-ant-…" autocomplete="off" />
      </div>
      <p style="font-size:12px;color:var(--text3);line-height:1.6;margin-top:-6px;margin-bottom:1rem">
        Used for AI photo labelling. Stored only in this browser, sent only to api.anthropic.com.
        Get a key at <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent)">console.anthropic.com</a>.
      </p>
      <div class="field">
        <label>Base URL for QR codes</label>
        <input type="text" id="s-baseurl" placeholder="https://yourusername.github.io/box-organiser/" />
      </div>
      <p style="font-size:12px;color:var(--text3);line-height:1.6;margin-top:-6px">
        Set this to your hosted app URL. QR codes link to <code style="font-size:11px">yourURL?box=1</code> etc.
        Leave blank to use the current page URL.
      </p>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────
const STORE = 'boxorg_v3';
const SSTORE = 'boxorg_settings';
let boxes = [];
let currentBoxId = null;
let saveTimer = null;

function loadData() {
  try { boxes = JSON.parse(localStorage.getItem(STORE) || '[]'); } catch(e) { boxes = []; }
}
function persistData() {
  localStorage.setItem(STORE, JSON.stringify(boxes));
  flashSaved();
}
function getSettings() {
  try { return JSON.parse(localStorage.getItem(SSTORE) || '{}'); } catch(e) { return {}; }
}

// ── Auto-save helpers ────────────────────────────────────────────────
function flashSaved() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

function getCurrentBox() {
  return boxes.find(b => b.id === currentBoxId);
}

function autoSaveField(key, value) {
  const box = getCurrentBox();
  if (!box) return;
  box[key] = value;
  persistData();
}

function autoSaveItems() {
  const box = getCurrentBox();
  if (!box) return;
  const inputs = document.querySelectorAll('#items-list [data-item]');
  box.items = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
  persistData();
}

function autoSaveTags() {
  const box = getCurrentBox();
  if (!box) return;
  const raw = document.getElementById('f-tags')?.value?.trim() || '';
  box.tags = raw ? raw.split(',').map(t => t.trim()).filter(Boolean) : [];
  persistData();
}

// ── Settings ─────────────────────────────────────────────────────────
function openSettings() {
  const s = getSettings();
  document.getElementById('s-apikey').value = s.apiKey || '';
  document.getElementById('s-baseurl').value = s.baseUrl || '';
  document.getElementById('settings-modal').style.display = 'flex';
}
function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
function saveSettings() {
  const s = getSettings();
  s.apiKey = document.getElementById('s-apikey').value.trim();
  s.baseUrl = document.getElementById('s-baseurl').value.trim();
  localStorage.setItem(SSTORE, JSON.stringify(s));
  closeSettings();
}

// ── Utilities ────────────────────────────────────────────────────────
function nextId() {
  return boxes.length ? Math.max(...boxes.map(b => b.id)) + 1 : 1;
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uid() { return Math.random().toString(36).slice(2, 9); }
function getBoxUrl(id) {
  const s = getSettings();
  const base = s.baseUrl ? s.baseUrl.replace(/\/?$/,'/') : window.location.href.split('?')[0];
  return `${base}?box=${id}`;
}

// ── Home grid ────────────────────────────────────────────────────────
function renderHome() {
  loadData();
  const grid = document.getElementById('grid');
  const label = document.getElementById('box-count-label');
  label.textContent = boxes.length ? `${boxes.length} box${boxes.length!==1?'es':''}` : 'Your boxes';
  grid.innerHTML = '';

  if (!boxes.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><p>No boxes yet — tap "+ New box" to get started.</p></div>`;
  }

  boxes.forEach(box => {
    const card = document.createElement('div');
    card.className = 'box-card';
    const firstPhoto = box.photos && box.photos[0];
    const thumbHtml = firstPhoto
      ? `<div class="box-card-thumb"><img src="${firstPhoto.dataUrl}" alt=""></div>`
      : `<div class="box-card-thumb">📦</div>`;
    const tagsHtml = (box.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
    const photoCount = (box.photos||[]).length;
    const itemCount = (box.items||[]).length;
    card.innerHTML = `
      ${thumbHtml}
      <div class="box-num">Box #${box.id}</div>
      <div class="box-name">${esc(box.name||'Untitled')}</div>
      <div class="box-meta">${photoCount} photo${photoCount!==1?'s':''} · ${itemCount} item${itemCount!==1?'s':''}</div>
      ${tagsHtml ? `<div class="box-tags">${tagsHtml}</div>` : ''}
    `;
    card.onclick = () => openDetail(box.id);
    grid.appendChild(card);
  });

  const add = document.createElement('div');
  add.className = 'add-card';
  add.innerHTML = `<div class="add-card-plus">+</div><div>Add box</div>`;
  add.onclick = createNewBox;
  grid.appendChild(add);
}

// ── Create new box ───────────────────────────────────────────────────
function createNewBox() {
  loadData();
  const id = nextId();
  boxes.push({ id, name: '', description: '', tags: [], items: [], photos: [] });
  boxes.sort((a,b) => a.id - b.id);
  persistData();
  openDetail(id);
}

// ── Detail screen ────────────────────────────────────────────────────
function openDetail(id) {
  loadData();
  currentBoxId = id;
  const box = boxes.find(b => b.id === id);
  if (!box) return;

  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('detail-screen').style.display = 'block';
  document.getElementById('detail-title').textContent = `Box #${box.id}`;
  renderDetail(box);
}

function closeDetail() {
  document.getElementById('detail-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'block';
  currentBoxId = null;
  renderHome();
}

function renderDetail(box) {
  const s = getSettings();
  const apiReady = !!s.apiKey;

  document.getElementById('detail-body').innerHTML = `
    <div class="two-col" style="margin-bottom:1.1rem">
      <div class="field" style="margin:0">
        <label>Box #</label>
        <input type="number" id="f-id" value="${box.id}" min="1"
          onchange="renumberBox(this.value)" />
      </div>
      <div class="field" style="margin:0">
        <label>Name / location</label>
        <input type="text" id="f-name" value="${esc(box.name)}"
          placeholder="e.g. Winter clothes — loft shelf 2"
          oninput="autoSaveField('name', this.value)" />
      </div>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Brief description of what's inside…"
        oninput="autoSaveField('description', this.value)">${esc(box.description)}</textarea>
    </div>

    <div class="field">
      <label>Tags <span style="font-weight:400;text-transform:none;letter-spacing:0">(comma-separated)</span></label>
      <input type="text" id="f-tags" value="${esc((box.tags||[]).join(', '))}"
        placeholder="e.g. seasonal, clothes, loft"
        oninput="autoSaveTags()" />
    </div>

    <div class="field">
      <label>Items in this box</label>
      <div id="items-list">${(box.items&&box.items.length?box.items:[''])
        .map((item,i)=>itemRowHtml(item,i)).join('')}</div>
      <button class="btn btn-sm btn-ghost" style="margin-top:6px" onclick="addItem()">+ Add item</button>
    </div>

    <div class="photos-section">
      <div class="photos-header">
        <label>Photos ${apiReady
          ? '<span style="color:var(--accent);font-size:10px;font-weight:400;text-transform:none;letter-spacing:0">✓ AI labelling on</span>'
          : '<span style="color:var(--text3);font-size:10px;font-weight:400;text-transform:none;letter-spacing:0">Add API key in Settings for AI labels</span>'}</label>
        <label class="btn btn-sm" style="cursor:pointer;position:relative">
          📷 Add photos
          <input type="file" accept="image/*" multiple
            style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%"
            onchange="handlePhotos(event)" />
        </label>
      </div>
      <div class="photos-grid" id="photos-grid"></div>
    </div>

    <div class="qr-wrap">
      <div class="qr-wrap-label">QR code — scan to open this box</div>
      <div id="qr-output"></div>
      <div class="qr-url-text" id="qr-url-text"></div>
    </div>
  `;

  renderPhotosGrid();
  generateQR(box.id);
}

// ── Items ────────────────────────────────────────────────────────────
function itemRowHtml(val, idx) {
  return `<div class="item-row" id="ir-${idx}">
    <input type="text" placeholder="e.g. Blue wool scarf" value="${esc(val)}"
      data-item="${idx}" oninput="autoSaveItems()" />
    <button class="rm-item" onclick="removeItem(${idx})">×</button>
  </div>`;
}
function addItem() {
  const list = document.getElementById('items-list');
  const idx = list.querySelectorAll('.item-row').length;
  const div = document.createElement('div');
  div.className = 'item-row'; div.id = `ir-${idx}`;
  div.innerHTML = `<input type="text" placeholder="Item name" data-item="${idx}"
    oninput="autoSaveItems()" />
    <button class="rm-item" onclick="removeItem(${idx})">×</button>`;
  list.appendChild(div);
  div.querySelector('input').focus();
}
function removeItem(idx) {
  const r = document.getElementById(`ir-${idx}`);
  if (r) { r.remove(); autoSaveItems(); }
}

// ── Photos ───────────────────────────────────────────────────────────
function renderPhotosGrid() {
  const box = getCurrentBox();
  if (!box) return;
  const grid = document.getElementById('photos-grid');
  if (!grid) return;
  grid.innerHTML = '';

  (box.photos||[]).forEach(photo => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.id = `pc-${photo.id}`;
    card.innerHTML = `
      <img src="${photo.dataUrl}" alt="${esc(photo.label||'')}">
      ${photo.aiLabelled ? '<div class="ai-badge">AI</div>' : ''}
      <button class="photo-rm" onclick="removePhoto('${photo.id}')">×</button>
      <div class="photo-label-area">
        <input class="photo-label" type="text"
          value="${esc(photo.label||'')}"
          placeholder="Label…"
          oninput="updatePhotoLabel('${photo.id}', this.value)" />
        <div class="photo-status" id="ps-${photo.id}">
          ${photo.aiLabelled ? '✨ AI label — tap to edit' : (photo.label ? '' : 'No label yet')}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  // always append upload tile at the end
  const tile = document.createElement('label');
  tile.className = 'upload-tile';
  tile.innerHTML = `
    <div class="upload-tile-icon">📷</div>
    <div>Add photos</div>
    <input type="file" accept="image/*" multiple onchange="handlePhotos(event)" />
  `;
  grid.appendChild(tile);
}

function removePhoto(id) {
  const box = getCurrentBox();
  if (!box) return;
  box.photos = (box.photos||[]).filter(p => p.id !== id);
  persistData();
  renderPhotosGrid();
}

function updatePhotoLabel(id, val) {
  const box = getCurrentBox();
  if (!box) return;
  const photo = (box.photos||[]).find(p => p.id === id);
  if (photo) { photo.label = val; photo.aiLabelled = false; }
  persistData();
  const statusEl = document.getElementById(`ps-${id}`);
  if (statusEl) statusEl.textContent = '';
}

async function handlePhotos(event) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  event.target.value = '';

  const box = getCurrentBox();
  if (!box) return;
  if (!box.photos) box.photos = [];

  // add loading placeholders immediately
  const placeholderIds = files.map(() => uid());
  placeholderIds.forEach(pid => {
    const grid = document.getElementById('photos-grid');
    if (!grid) return;
    // insert before the upload tile
    const tile = grid.querySelector('.upload-tile');
    const placeholder = document.createElement('div');
    placeholder.className = 'photo-loading';
    placeholder.id = `placeholder-${pid}`;
    placeholder.innerHTML = `<div class="spin"></div><div>Adding…</div>`;
    grid.insertBefore(placeholder, tile);
  });

  // process each file
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const pid = placeholderIds[i];
    const dataUrl = await readAsDataUrl(file);

    const photoObj = { id: uid(), dataUrl, label: '', aiLabelled: false };
    box.photos.push(photoObj);
    persistData();

    // replace placeholder with real card
    const placeholder = document.getElementById(`placeholder-${pid}`);
    if (placeholder) placeholder.remove();

    // insert real card before upload tile
    const grid = document.getElementById('photos-grid');
    if (grid) {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.id = `pc-${photoObj.id}`;
      card.innerHTML = `
        <img src="${photoObj.dataUrl}" alt="">
        <button class="photo-rm" onclick="removePhoto('${photoObj.id}')">×</button>
        <div class="photo-label-area">
          <input class="photo-label" type="text" value="" placeholder="Label…"
            oninput="updatePhotoLabel('${photoObj.id}', this.value)" />
          <div class="photo-status" id="ps-${photoObj.id}">No label yet</div>
        </div>
      `;
      const tile = grid.querySelector('.upload-tile');
      grid.insertBefore(card, tile);
    }

    // fire AI labelling
    labelWithAI(photoObj.id, dataUrl);
  }
}

function readAsDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function labelWithAI(photoId, dataUrl) {
  const s = getSettings();
  if (!s.apiKey) return;

  const statusEl = document.getElementById(`ps-${photoId}`);
  if (statusEl) statusEl.innerHTML = `<span class="spin" style="width:10px;height:10px;border-width:1.5px"></span> Identifying…`;

  const base64 = dataUrl.split(',')[1];
  const mime = (dataUrl.match(/data:([^;]+);/) || [])[1] || 'image/jpeg';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': s.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 60,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mime, data: base64 } },
            { type: 'text', text: 'In 5 words or fewer, name what you see. Be specific. Reply with ONLY the label, no punctuation, no explanation.' }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || res.statusText);
    }

    const data = await res.json();
    const label = data.content?.[0]?.text?.trim() || '';

    const box = getCurrentBox();
    if (box) {
      const photo = (box.photos||[]).find(p => p.id === photoId);
      if (photo && label) { photo.label = label; photo.aiLabelled = true; }
      persistData();
    }

    // update the input live
    const input = document.querySelector(`#pc-${photoId} .photo-label`);
    if (input) input.value = label;
    const badge = document.querySelector(`#pc-${photoId} .ai-badge`);
    if (!badge) {
      const img = document.querySelector(`#pc-${photoId} img`);
      if (img) {
        const b = document.createElement('div');
        b.className = 'ai-badge'; b.textContent = 'AI';
        img.after(b);
      }
    }
    if (statusEl) statusEl.textContent = '✨ AI label — tap to edit';

  } catch(err) {
    if (statusEl) statusEl.textContent = `⚠ ${err.message||'AI failed'}`;
  }
}

// ── Renumber box ─────────────────────────────────────────────────────
function renumberBox(newIdStr) {
  const newId = parseInt(newIdStr);
  if (!newId || newId === currentBoxId) return;
  if (boxes.find(b => b.id === newId && b.id !== currentBoxId)) {
    alert(`Box #${newId} already exists.`);
    document.getElementById('f-id').value = currentBoxId;
    return;
  }
  const box = getCurrentBox();
  if (box) {
    box.id = newId;
    currentBoxId = newId;
    document.getElementById('detail-title').textContent = `Box #${newId}`;
    persistData();
    generateQR(newId);
  }
}

// ── QR code ──────────────────────────────────────────────────────────
function generateQR(id) {
  const out = document.getElementById('qr-output');
  const urlEl = document.getElementById('qr-url-text');
  if (!out) return;
  out.innerHTML = '';
  const url = getBoxUrl(id);
  if (urlEl) urlEl.textContent = url;
  if (window.QRCode) {
    new QRCode(out, { text: url, width: 130, height: 130, correctLevel: QRCode.CorrectLevel.M });
  }
}

// ── Delete box ───────────────────────────────────────────────────────
function deleteBox() {
  if (!confirm('Delete this box and all its photos?')) return;
  boxes = boxes.filter(b => b.id !== currentBoxId);
  persistData();
  closeDetail();
}

// ── Print ────────────────────────────────────────────────────────────
function printAllLabels() {
  if (!boxes.length) { alert('No boxes to print yet!'); return; }
  openPrintWindow(boxes);
}
function printOneLabel() {
  const box = getCurrentBox();
  if (box) openPrintWindow([box]);
}
function openPrintWindow(boxList) {
  const win = window.open('', '_blank');
  if (!win) { alert('Allow popups to print labels.'); return; }
  const labelsHtml = boxList.map(box => {
    const url = getBoxUrl(box.id);
    return `<div class="label">
      <div class="lnum">BOX #${box.id}</div>
      <div class="lname">${box.name||'Untitled'}</div>
      <div id="lqr-${box.id}"></div>
      <div class="lurl">${url}</div>
    </div>`;
  }).join('');
  const qrScripts = boxList.map(b =>
    `new QRCode(document.getElementById('lqr-${b.id}'),{text:'${getBoxUrl(b.id)}',width:110,height:110});`
  ).join('\n');
  win.document.write(`<!DOCTYPE html><html><head><title>Box Labels</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
    <style>body{font-family:Georgia,serif;padding:20px;background:#fff}
    h2{margin-bottom:20px;font-size:16px}
    .labels{display:flex;flex-wrap:wrap;gap:16px}
    .label{border:1px solid #ccc;border-radius:10px;padding:14px;text-align:center;width:180px;break-inside:avoid}
    .lnum{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#999;margin-bottom:3px}
    .lname{font-size:15px;font-weight:700;margin-bottom:10px}
    .lurl{font-size:9px;color:#bbb;margin-top:6px;word-break:break-all}
    @media print{body{padding:8px}h2{display:none}.label{border-color:#ddd}}</style>
    </head><body>
    <h2>Box Labels</h2><div class="labels">${labelsHtml}</div>
    <script>${qrScripts}setTimeout(()=>window.print(),900);<\/script></body></html>`);
  win.document.close();
}

// ── Deep link ────────────────────────────────────────────────────────
function checkDeepLink() {
  const id = parseInt(new URLSearchParams(window.location.search).get('box'));
  if (id) {
    const box = boxes.find(b => b.id === id);
    if (box) openDetail(id);
    else alert(`Box #${id} not found on this device.`);
  }
}

// ── Boot ─────────────────────────────────────────────────────────────
loadData();
renderHome();
checkDeepLink();
</script>
